<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regle RAG | API Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            width: 100%;
            flex-grow: 1;
        }

        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .api-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .api-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .api-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
        }

        .api-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .api-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border-radius: 8px;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(0, 0, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            margin-top: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-header {
            font-weight: 600;
            color: var(--accent-tertiary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: block;
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: auto;
        }

        .status-online { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-offline { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        footer {
            padding: 3rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    </style>
</head>
<body>
    <header>
        <h1>Regle RAG API Control</h1>
    </header>

    <div class="container">
        <div class="api-grid">
            <!-- GitHub API -->
            <div class="api-card">
                <div class="api-title">
                    <span class="api-icon">🐙</span> GitHub Search
                </div>
                <div class="form-group">
                    <label>Query</label>
                    <input type="text" id="query-github" placeholder="e.g. LangGraph custom node">
                </div>
                <button onclick="testApi('github')">
                    <span id="btn-text-github">Test Service</span>
                    <div id="loader-github" class="loader" style="display: none;"></div>
                </button>
                <div id="results-github" class="results-container"></div>
            </div>

            <!-- Supabase API -->
            <div class="api-card">
                <div class="api-title">
                    <span class="api-icon">⚡</span> Supabase RAG
                </div>
                <div class="form-group">
                    <label>Query</label>
                    <input type="text" id="query-supabase" placeholder="e.g. Regle architecture notes">
                </div>
                <button onclick="testApi('supabase')">
                    <span id="btn-text-supabase">Test Service</span>
                    <div id="loader-supabase" class="loader" style="display: none;"></div>
                </button>
                <div id="results-supabase" class="results-container"></div>
            </div>

            <!-- Youtube API -->
            <div class="api-card">
                <div class="api-title">
                    <span class="api-icon">📺</span> YouTube Transcripts
                </div>
                <div class="form-group">
                    <label>Query</label>
                    <input type="text" id="query-youtube" placeholder="e.g. LangGraph tutorial">
                </div>
                <button onclick="testApi('youtube')">
                    <span id="btn-text-youtube">Test Service</span>
                    <div id="loader-youtube" class="loader" style="display: none;"></div>
                </button>
                <div id="results-youtube" class="results-container"></div>
            </div>

            <!-- SearXNG API -->
            <div class="api-card">
                <div class="api-title">
                    <span class="api-icon">🌐</span> Web (SearXNG)
                </div>
                <div class="form-group">
                    <label>Query</label>
                    <input type="text" id="query-web" placeholder="e.g. Nvidia Nemotron features">
                </div>
                <button onclick="testApi('web')">
                    <span id="btn-text-web">Test Service</span>
                    <div id="loader-web" class="loader" style="display: none;"></div>
                </button>
                <div id="results-web" class="results-container"></div>
            </div>

            <!-- Orchestrator API -->
            <div class="api-card" style="grid-column: 1 / -1; border-color: rgba(59, 130, 246, 0.3);">
                <div class="api-title">
                    <span class="api-icon">🧠</span> Master Orchestrator (LangGraph)
                </div>
                <div class="form-group">
                    <label>Complex Research Question</label>
                    <input type="text" id="query-orchestrate" placeholder="How do I build a Regle RAG with Supabase and GitHub parallel search?">
                </div>
                <button onclick="testApi('orchestrate')" style="background: linear-gradient(135deg, #2563eb, #7c3aed);">
                    <span id="btn-text-orchestrate">Execute Multi-Modal Research</span>
                    <div id="loader-orchestrate" class="loader" style="display: none;"></div>
                </button>
                <div id="results-orchestrate" class="results-container"></div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Regle RAG Engine | Built for High-Performance Intelligence
    </footer>

    <script>
        const API_BASE = "http://localhost:8000/api/v1/chat";

        async function testApi(service) {
            const input = document.getElementById(`query-${service}`);
            const resultsDiv = document.getElementById(`results-${service}`);
            const btnText = document.getElementById(`btn-text-${service}`);
            const loader = document.getElementById(`loader-${service}`);
            
            const question = input.value;
            if (!question) {
                alert("Please enter a query.");
                return;
            }

            // UI State: Loading
            resultsDiv.style.display = "none";
            resultsDiv.innerHTML = "";
            btnText.style.display = "none";
            loader.style.display = "block";
            
            try {
                const endpoint = service === 'orchestrate' ? '/orchestrate' : `/search/${service}`;
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, limit: 3 })
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                
                // Render results
                renderResults(service, data);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="result-item" style="color: #ef4444;">Error: ${error.message}</div>`;
                resultsDiv.style.display = "block";
            } finally {
                // UI State: Reset
                btnText.style.display = "block";
                loader.style.display = "none";
            }
        }

        function renderResults(service, data) {
            const resultsDiv = document.getElementById(`results-${service}`);
            resultsDiv.style.display = "block";

            if (service === 'orchestrate') {
                resultsDiv.innerHTML = `
                    <div class="result-item">
                        <span class="result-header">ORCHESTRATOR PLAN</span>
                        <div style="font-size: 0.85rem; color: #60a5fa; margin-bottom: 1rem;">
                            ${data.plan ? data.plan.map(p => `• ${p}`).join('<br>') : 'No explicit plan.'}
                        </div>
                        <span class="result-header">FINAL GENERATION</span>
                        <div style="font-size: 0.95rem; line-height: 1.6; margin-bottom: 1rem;">
                            ${data.generation.replace(/\n/g, '<br>')}
                        </div>
                        <details>
                            <summary style="cursor: pointer; font-size: 0.8rem; color: var(--text-dim);">View Raw JSON Response</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    </div>
                `;
                return;
            }

            const results = data.results || [];
            if (results.length === 0) {
                resultsDiv.innerHTML = `<div class="result-item">No results found for this query.</div>`;
            } else {
                results.forEach((item, index) => {
                    resultsDiv.innerHTML += `
                        <div class="result-item">
                            <span class="result-header">RESULT #${index + 1}: ${item.metadata?.title || 'No Title'}</span>
                            <div style="font-size: 0.85rem; margin-bottom: 0.5rem; color: white;">
                                ${item.content.substring(0, 300)}...
                            </div>
                            <div style="font-size: 0.75rem; color: var(--accent-primary);">
                                <a href="${item.metadata?.url || '#'}" target="_blank" style="color: inherit; text-decoration: none;">View Source ↗</a>
                            </div>
                        </div>
                    `;
                });
                
                // Add raw toggle
                resultsDiv.innerHTML += `
                    <div class="result-item">
                        <details>
                            <summary style="cursor: pointer; font-size: 0.8rem; color: var(--text-dim);">View Raw JSON Response</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
